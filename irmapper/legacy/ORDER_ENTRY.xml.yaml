              - index: 2
                type: "if"
                content: "IF :BLK_ORDERS.ORDER_TOTAL > 1000 THEN"
                nesting_level: 1
                child_statements:
                  - index: 3
                    type: "call"
                    content: "MESSAGE('High Value Order')"
                    nesting_level: 2
              - index: 4
                type: "call"
                content: "LOG_PROCESS(:BLK_ORDERS.ORDER_ID)"
                nesting_level: 1
